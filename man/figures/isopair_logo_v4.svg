<svg width="680" viewBox="0 0 680 285" xmlns="http://www.w3.org/2000/svg">

  <!-- Pear stem -->
  <path d="M 160,42 C 158,26 163,17 167,11" stroke="#8B5E2A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Leaf -->
  <path d="M 163,27 C 176,18 187,25 180,37 C 172,31 163,27 163,27 Z" fill="#5A8E1E"/>

  <!-- Pear body -->
  <path d="M 160,42 C 175,42 193,55 199,75 C 210,101 215,134 217,160 C 219,185 213,210 160,220 C 107,210 101,185 103,160 C 105,134 110,101 121,75 C 127,55 145,42 160,42 Z" fill="#9DC73A" stroke="#6E8E25" stroke-width="1.5"/>
  <!-- Highlight -->
  <ellipse cx="147" cy="100" rx="10" ry="17" fill="white" opacity="0.22"/>

  <!-- Isoform 1 label -->
  <text x="285" y="82" font-family="sans-serif" font-size="11" fill="#AAAAAA" font-style="italic">Isoform 1</text>
  <!-- Connector -->
  <line x1="285" y1="99" x2="487" y2="99" stroke="#C4CDD8" stroke-width="1.5"/>
  <!-- E1 -->
  <rect x="285" y="88" width="52" height="22" rx="3" fill="#3D7EC5"/>
  <text x="311" y="103" font-family="sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="500">E1</text>
  <!-- E2 (alternative, orange) -->
  <rect x="359" y="88" width="52" height="22" rx="3" fill="#D4872A"/>
  <text x="385" y="103" font-family="sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="500">E2</text>
  <!-- E3 -->
  <rect x="433" y="88" width="52" height="22" rx="3" fill="#3D7EC5"/>
  <text x="459" y="103" font-family="sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="500">E3</text>

  <!-- Isoform 2 label -->
  <text x="285" y="150" font-family="sans-serif" font-size="11" fill="#AAAAAA" font-style="italic">Isoform 2</text>
  <!-- Connector -->
  <line x1="285" y1="167" x2="487" y2="167" stroke="#C4CDD8" stroke-width="1.5"/>
  <!-- E1 -->
  <rect x="285" y="156" width="52" height="22" rx="3" fill="#3D7EC5"/>
  <text x="311" y="171" font-family="sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="500">E1</text>
  <!-- E3 only (E2 skipped) -->
  <rect x="433" y="156" width="52" height="22" rx="3" fill="#3D7EC5"/>
  <text x="459" y="171" font-family="sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="500">E3</text>
  <!-- Exon skipping arc -->
  <path d="M 337,156 Q 385,130 433,156" fill="none" stroke="#D4872A" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Logo text -->
  <text x="340" y="258" font-family="sans-serif" font-size="42" font-weight="500" text-anchor="middle">
    <tspan fill="#3D7EC5">Iso</tspan><tspan fill="#6E8E25" dx="2">pair</tspan>
  </text>

</svg>
